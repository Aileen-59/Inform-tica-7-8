<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
             Aileen Magadan Ruiz Portfolio
        </title>
    </head>
    <body>
      <form>
        <label for="firstname">First name: </label>
        <input type="text" name="firstname"  required>
        <br>
        <label for="lastname">Last name: </label>
        <input type="text" name="lastname"  required>
        <br>
        <label for="gender">Gender:</label>
        <input type="radio" name="gender" value="Male"><span>Male</span>
        <input type="radio" name="gender" value="Female"><span>Female</span>
        <br>
        <label for="typeofapplication">Type of Application:</label>
        <input type="checkbox" name="typeofapplication" value="Participant"><span>Participant</span>
        <input type="checkbox" name="typeofapplication" value="Counselor"><span>Counselor</span>

        <br>
        <label for="email">Email: </label>
        <input type="email" name="email"  required>

        <br>
        <label for="phonenumber">Phone number: </label>
        <input type="phonenumber" name="Phonenumber" required>
        <br>
        <input type="submit" value="Login!">
</form>

    </body>
</html>
