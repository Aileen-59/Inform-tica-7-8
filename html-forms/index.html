<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
             FSY Coordinación Ciudad Juárez 2026
        </title>
    </head>
    <h1><a href="https://www.churchofjesuschrist.org/youth/childrenandyouth/fsy/?lang=eng" target="_blank">Consejo de Coordinación Ciudad Juárez 2026</a></h1>
    <br>
    <body>
        <img src="https://cdn.ldsliving.com/dims4/default/ffcfedd/2147483647/strip/false/crop/1484x809+0+0/resize/1484x809!/quality/90/?url=http%3A%2F%2Flds-living-brightspot-us-east-2.s3.us-east-2.amazonaws.com%2F8d%2F29%2Fc46c27b94b4bb383fed781505bf2%2F1-cwd-32372-d-52-1007-527-d-e-053-ca-02630-a-81-e-1-alt.jpg" height="300">

        <h1>FSY</h1>
        <h2>Personal Information</h2>
      <form>
        <label for="firstname">First name: </label>
        <input type="text" name="firstname"  required>
        <br>
        <label for="lastname">Last name: </label>
        <input type="text" name="lastname"  required>
        <br>
        <label for="gender">Gender:</label>
        <input type="radio" name="gender" value="Male"><span>Male</span>
        <input type="radio" name="gender" value="Female"><span>Female</span>
        <br>
        <label for="typeofapplication">Type of Application:</label>
        <input type="checkbox" name="typeofapplication" value="Participant"><span>Participant</span>
        <input type="checkbox" name="typeofapplication" value="Counselor"><span>Counselor</span>



        <br>
        <label for="phonenumber">Phone number: </label>
        <input type="phonenumber" name="Phonenumber" required>
        <br>
        <label for="email">Email: </label>
        <input type="email" name="email"  required>

        <h2>Emergency Contact </h2>
        <h5>Parent 1</h5>
        <label for="name">Name: </label>
        <input type="text" name="name"  required>
        <br>
        <label for="email">Email: </label>
        <input type="email" name="email"  required>
        <br>
         <label for="phonenumber">Phone number: </label>
        <input type="phonenumber" name="Phonenumber" required>
        <br>

        <h5>Parent 2</h5>
        <label for="name">Name: </label>
        <input type="text" name="name"  required>
        <br>
        <label for="email">Email: </label>
        <input type="email" name="email"  required>
        <br>
         <label for="phonenumber">Phone number: </label>
        <input type="phonenumber" name="Phonenumber" required>
        <br>

        <h2>Residence</h2>
         <label for="Stake/District/Mission">Stake / District / Mission: </label>
        <input type="text" name="Stake/District/Mission"  required>
        <br>
            <label for="Ward/Branch ">Ward / Branch : </label>
        <input type="text" name="Ward/Branch "  required>
        <br>
             <label for="Bishop">Bishop: </label>
        <input type="text" name="Bishop"  required>

        <h2>Special Details</h2>
         <label for="Dietaryinformation">Dietary Information: </label>
        <input type="text" name="Dietaryinformation"  required>
        <br>
            <label for="T-shirt Size">T-shirt Size:</label>
        <input type="checkbox" name="T-shirt Size" value="S"><span>S</span>
        <input type="checkbox" name="T-shirt Size" value="M"><span>M</span>
        <input type="checkbox" name="T-shirt Size" value="L"><span>L</span>
         <input type="checkbox" name="T-shirt Size" value="XL"><span>XL</span>
         <br>
            <label for="specialdiet">Do you require a special diet?:</label>
        <input type="checkbox" name="Yes" value="Yes"><span>Yes</span>
         <input type="checkbox" name="No" value="No"><span>No</span>
         <br>
            <label for="YES">If the answer is Yes, please specify dietary restrictions: </label>
        <input type="text" name="YES"  >

            <br>
             <label for="allergies">Does the participant have allergies?</label>
             <input type="checkbox" name="allergies" value="Yes"><span>Yes</span>
            <input type="checkbox" name="allergies" value="No"><span>No</span>
            <br>
            <label for="YES">If the answer is Yes, please specify allergies: </label>
        <input type="text" name="YES">

        <br>
            <label for="medicine">Does the participant take any medication?</label>
             <input type="checkbox" name="medicine" value="Yes"><span>Yes</span>
            <input type="checkbox" name="medicine" value="No"><span>No</span>
            <br>
            <label for="YES">If the answer is Yes, please specify the medications that the participant takes: </label>
        <input type="text" name="YES">

        <br>
        <label for="illness">Do you have a chronic or recurring illness?</label>
             <input type="checkbox" name="illness" value="Yes"><span>Yes</span>
            <input type="checkbox" name="illness" value="No"><span>No</span>
            <br>
            <label for="YES">If the answer is Yes, please specify the illness: </label>
        <input type="text" name="YES">

        <br>
        <input type="submit" value="Login!">
</form>

    </body>
</html>
